{% load i18n %}
      <footer class="footer" style="background: var(--bg-panel); border-top: 2px solid var(--border-color); padding: 40px 0 20px 0; margin-top: auto;">
        <div class="container">
          <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
              <div style="font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--theme-blue);">
                Deepland
              </div>
              <p style="font-size: 0.9rem; color: var(--text-medium); font-weight: 600; margin: 0; max-width: 300px;">
                {% trans "Learn algorithms in a fun and interactive way." %}
              </p>
            </div>
            
            <div style="display: flex; gap: 30px; flex-wrap: wrap; text-align: right;">
                <div style="display: flex; gap: 20px;">
                  <a href="#" style="color: var(--text-medium); transition: color 0.2s; font-size: 1.5rem;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'"><i class="fa-brands fa-telegram"></i></a>
                  <a href="#" style="color: var(--text-medium); transition: color 0.2s; font-size: 1.5rem;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'"><i class="fa-brands fa-instagram"></i></a>
                  <a href="#" style="color: var(--text-medium); transition: color 0.2s; font-size: 1.5rem;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'"><i class="fa-brands fa-youtube"></i></a>
                  <a href="#" style="color: var(--text-medium); transition: color 0.2s; font-size: 1.5rem;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'"><i class="fa-brands fa-github"></i></a>
                </div>
            </div>
          </div>
          
          <div style="width: 100%; height: 2px; background: var(--border-color); margin: 30px 0 20px 0;"></div>
          
          <div style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 700; color: var(--text-medium); gap: 15px;">
            <div>
              &copy; <script>document.write(new Date().getFullYear())</script> Deepland. {% trans "All rights reserved." %}
            </div>
            <div style="display: flex; gap: 20px;">
              <a href="{% url 'terms' %}" style="color: var(--text-medium); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'">{% trans "Terms of Use" %}</a>
              <a href="{% url 'privacy' %}" style="color: var(--text-medium); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color='var(--theme-blue)'" onmouseout="this.style.color='var(--text-medium)'">{% trans "Privacy Policy" %}</a>
            </div>
          </div>
        </div>
      </footer>
